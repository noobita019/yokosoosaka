<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sync Test</title>
<style>
  .fullscreen-viewer { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:#000; z-index:10000; align-items:center; justify-content:center; }
  .fullscreen-viewer.active { display:flex; }
  .fullscreen-track { display:flex; flex-direction:column; }
  .fullscreen-slide { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .fullscreen-slide img { max-width:100vw; max-height:100vh; object-fit:contain; }
  #result { margin:20px; padding:20px; font-family:monospace; white-space:pre; background:#eee; border-radius:8px; font-size:14px; }
  .pass { color:green;font-weight:bold; } .fail { color:red;font-weight:bold; }
</style></head>
<body>
<div id="result">Running...</div>
<div class="fullscreen-viewer" id="fullscreenViewer">
  <button class="fullscreen-close">&times;</button>
  <div class="fullscreen-track-container">
    <div class="fullscreen-track" id="fullscreenTrack"></div>
  </div>
  <div class="fullscreen-counter" id="fullscreenCounter"></div>
</div>
<div class="modal-overlay" id="productModal"></div>
<script src="maintenance.js"></script>
<script src="js/app.js?v=20250529"></script>
<script>
var L = [];
function a(p,m){L.push((p?'<span class=\"pass\">PASS</span>':'<span class=\"fail\">FAIL</span>')+' '+m);document.getElementById('result').innerHTML=L.join('<br>');}

a(typeof openModalFullscreen==='function','openModalFullscreen');
a(typeof openFullscreen==='function','openFullscreen');
a(typeof openModal==='function','openModal');
a(typeof closeLiveModal==='function','closeLiveModal');
a(typeof products!=='undefined','products exists');
a(typeof _modalImages!=='undefined','_modalImages exists');
a(typeof currentModalImages!=='undefined','currentModalImages exists');

if (typeof products!=='undefined' && products.length>0) {
  a(true,products.length+' products loaded');
  a(true,'First product: '+products[0].name);
  
  openModal(products[0]);
  var mi=document.getElementById('modalMainImg');
  if(mi){
    a(true,'#modalMainImg found after openModal');
    a(mi.hasAttribute('onclick'),'has onclick attr');
    var t=document.title;
    mi.click();
    if(document.title!==t){
      a(true,'click changed title to "'+document.title+'" - openModalFullscreen called');
    } else {
      a(false,'title unchanged after click');
    }
    if(document.getElementById('fullscreenViewer').classList.contains('active')){
      a(true,'fullscreen viewer IS active');
      var sc=document.querySelectorAll('#fullscreenTrack .fullscreen-slide').length;
      a(true,sc+' slides rendered');
    } else {
      a(false,'fullscreen viewer NOT active');
    }
    closeLiveModal();
  } else {
    a(false,'#modalMainImg NOT found');
  }
} else {
  a(false,'products empty: type='+(typeof products)+' len='+(products?products.length:'N/A'));
}
a(true,'--- DONE ---');
</script>
</body></html>
